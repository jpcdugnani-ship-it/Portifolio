<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montagem</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            overflow: hidden;
        }

        .header {
            font-family: "Hanken Grotesk", sans-serif;
            font-weight: 900;
            font-size: 20px;
            color: #ff9900;
            padding: 20px;
            background-color: #fff4e0;
            border-bottom: 2px solid #ff9900;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .header .title {
            text-align: left;
            font-size: 20px;
            font-weight: bold;
            margin-left: 20px;
        }

        .header .menu-button {
            background-color: #ffffff;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            font-size: 20px;
            padding: 10px 20px;
            box-sizing: border-box;
        }

        .title {
            text-align: left;
            font-size: 48px;
            font-weight: bold;
            margin-top: 20px;
            margin-left: 20px;
            padding-bottom: 10px;
        }

        .pdf-container {
            width: 100%;
            height: calc(100vh - 140px);
            display: flex;
            justify-content: center;
             align-items: flex-start;
            padding: 0 20px;
            margin-top: 20px;
    }

    .pdf-container iframe {
        width: 70%;
        height: 80%;
        border: none;
    }


        .overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 15%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .menu-list {
            color: #ffffff;
            padding: 20px;
            border-radius: 5px;
            font-size: 30px;
            text-align: center;
        }

        .menu-list ul {
            list-style: none;
            padding: 0;
        }

        .menu-list li {
            padding: 15px 0;
        }

        .menu-list button {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 10px 20px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }
    </style>
    <script>
        function toggleMenu() {
            const overlay = document.querySelector('.overlay');
            overlay.style.display = overlay.style.display === 'flex' ? 'none' : 'flex';
        }
    </script>
</head>
<body>

    <div class="header">
        <div class="title">Eiru-Taquara | Montagem da caixa</div>
        <div class="menu-button" onclick="toggleMenu()">☰ Saiba Mais</div>
    </div>

    <div class="overlay" onclick="toggleMenu()">
        <div class="menu-list">
            <ul>
                <li><button onclick="window.location.href='../Menu/Aldeiatekoyvypora.html'">Menu</button></li>
                <li><button onclick="window.location.href='../Siteabelhinhas/Eiru-Taquara_BancodeBambu.html'">Bambu</button></li>
                <li><button onclick="window.location.href='../Menu/Abelhas.html'">Caixas e Abelhas</button></li>
                <li><button onclick="window.location.href='../Aldeia/Sobrealdeia.html'">Sobre</button></li>
            </ul>
        </div>
    </div>

    <div class="title">Passo-a-Passo</div>

    <div class="pdf-container">
        <iframe src="manual montagem caixa didática .pdf" frameborder="0"></iframe>
    </div>

</body>
</html>
