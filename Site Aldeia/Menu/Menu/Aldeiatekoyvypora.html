<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eiru-Taquara | Aldeia Tekoa YVY Porã Jaraguá</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background-image: url("Aldeia Tekoa Yvy Porã.jpg");
            background-size: 1500px;
            background-position: 1500px;
            background-position-y: 1565px;
            color: #000000;
            overflow: hidden;
        }

        .header {
            font-family: "Inter", sans-serif;
            font-weight: bold;
            font-size: 20px;
            text-align: center;
            color: rgb(0, 0, 0);
            padding: 10px;
            background-color: #e3e3e3;
            border-bottom: 2px solid rgb(255, 255, 255);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-button {
            background-color: #ffffff;
            color: #000000;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            font-size: 20px;
            padding: 15px 30px;
            box-sizing: border-box;
            border: none;
        }

        .overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 25%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .menu-list {
            color: #ffffff;
            padding: 20px;
            border-radius: 5px;
            font-size: 30px;
            text-align: center;
        }

        .menu-list ul {
            list-style: none;
            padding: 0;
        }

        .menu-list li {
            padding: 15px 0;
        }

        .menu-list button {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 10px 20px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }

        .title-background {
            position: absolute;
            font-size: 100px;
            color: rgb(255, 255, 255);
            font-weight: bold;
            z-index: 1;
            top: 65%;
            text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.8);
        }
    </style>
    <script>
        function toggleMenu() {
            const overlay = document.querySelector('.overlay');
            overlay.style.display = overlay.style.display === 'flex' ? 'none' : 'flex';
        }
    </script>
</head>
<body>

    <div class="header">
        Eiru-Taquara | Aldeia Tekoa YVY Porã Jaraguá
        <div class="menu-button" onclick="toggleMenu()">☰ Saiba Mais</div>
    </div>

    <div class="overlay" onclick="toggleMenu()">
        <div class="menu-list">
            <ul>
                <li><button onclick="window.location.href='../Menu/Aldeiatekoyvypora.html'">Menu</button></li>
                <li><button onclick="window.location.href='../Siteabelhinhas/Eiru-Taquara_BancodeBambu.html'">Bambu</button></li>
                <li><button onclick="window.location.href='../Menu/Abelhas.html'">Caixas e Abelhas</button></li>
                <li><button onclick="window.location.href='../Aldeia/Sobrealdeia.html'">Sobre</button></li>
            </ul>
        </div>
    </div>

    <div class="title-background">Aldeia Tekoa YVY Porã Jaraguá</div>

</body>
</html>
