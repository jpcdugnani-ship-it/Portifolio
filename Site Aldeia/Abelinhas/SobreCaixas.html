<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            margin-top: 60px; 
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #f9efe0;
            border-bottom: 2px solid #ff9900;
            z-index: 10; 
        }

        .left-title {
            font-size: 20px;
            color: #ff9900;
            font-weight: bold;
            margin-left: 20px;
        }

        .menu-button {
            background-color: #ffffff;
            color: #000000;
            font-weight: bold;
            font-size: 20px;
            padding: 15px 30px;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .menu-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        .menu-list button {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 90%;
            max-width: 300px;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.3);
        }

        .content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 40px;
            gap: 20px;
            width: 100%;
            text-align: center;
        }

        .rectangles-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            width: 100%;
        }

        .rectangle {
            flex: 1;
            min-width: 47%;
            max-width: 50%;
            height: 400px;
            position: relative;
            overflow: hidden;
            border-radius: 5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .rectangle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: right;
            position: relative;
            transition: filter 0.3s;
        }

        .hover-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 30px;
            font-weight: bold;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 2;
        }

        .rectangle:hover .hover-text {
            visibility: visible;
            opacity: 1;
        }

        .rectangle:hover img {
            filter: brightness(50%);
        }
    </style>
</head>
<body>

    <header>
        <div class="left-title">Eiru-Taquara | Caixas</div>
        <button class="menu-button" onclick="toggleMenu()">☰ Saiba Mais</button>
    </header>

    <div class="overlay" onclick="toggleMenu()">
        <div class="menu-list">
            <li><button onclick="window.location.href='../Menu/Aldeiatekoyvypora.html'">Menu</button></li>
            <li><button onclick="window.location.href='../Siteabelhinhas/Eiru-Taquara_BancodeBambu.html'">Bambu</button></li>
            <li><button onclick="window.location.href='../Menu/Abelhas.html'">Caixas e Abelhas</button></li>
            <li><button onclick="window.location.href='../Aldeia/Sobrealdeia.html'">Sobre</button></li>
        </div>
    </div>

    <div class="content">
        <div class="rectangles-container">
            <div class="rectangle" onclick="window.location.href='../Individuais/Galeria.html'">
                <div class="hover-text">Galeria</div>
                <img src="30.jpeg" alt="Galeria">
            </div>
            <div class="rectangle" onclick="window.location.href='Montagem.html'">
                <div class="hover-text">Montagem</div>
                <img src="IMG_2482-_2_.jpg" alt="Montagem">
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const overlay = document.querySelector('.overlay');
            overlay.style.display = overlay.style.display === 'flex' ? 'none' : 'flex';
        }
    </script>

</body>
</html>
